# Nom........ : render.yaml (Render Blueprint — https://render.com/docs/blueprint-spec)
# Description : Déploie 2 services :
#                 - veille-scientifique-api   -> API Flask (lit bdd.db sur disque persistant)
#                 - veille-scientifique-front -> site statique (index.html, app.js, ...)
# Usage...... : Pousse ce dépôt sur GitHub, puis sur Render :
#                 New > Blueprint > sélectionne ce dépôt > Deploy Blueprint.
services:
  # ------------------------------------------------------------------------
  # 1) API Flask — bdd.db (~1,3 Go) vit sur un disque persistant, téléchargé
  #    une seule fois puis réutilisé à chaque déploiement suivant.
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-api
    runtime: python
    plan: standard
    region: frankfurt
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python download_db.py && gunicorn api_flask:application --timeout 120"
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: veille-scientifique-data
      mountPath: /var/data
      sizeGB: 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_DOWNLOAD_URL
        value: https://github.com/MaelKonde/RealisationDeProgramme/releases/download/v1-db/bdd.db
      - key: DB_DIR
        value: /var/data
  # ------------------------------------------------------------------------
  # 2) Front-end statique (index.html + style.css + app.js + config.js +
  #    data.js + favicon.svg), tous à la racine du dépôt.
  # ------------------------------------------------------------------------
  - type: web
    name: veille-scientifique-front
    runtime: static
    buildCommand: "echo 'Site statique - aucun build necessaire'"
    staticPublishPath: ./
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
